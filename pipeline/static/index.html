<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRROR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    h1 { font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin-bottom: 8px; }
    .tagline { color: #888; font-size: 1.1rem; margin-bottom: 48px; }
    .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 40px; width: 100%; max-width: 560px; }
    label { display: block; font-size: 0.85rem; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    input[type="file"] { width: 100%; padding: 16px; background: #1a1a1a; border: 1px dashed #333; border-radius: 8px; color: #f0f0f0; cursor: pointer; margin-bottom: 24px; }
    button { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { margin-top: 24px; padding: 16px; background: #1a1a1a; border-radius: 8px; font-family: monospace; font-size: 0.85rem; line-height: 1.8; display: none; }
    #result { margin-top: 24px; display: none; }
    .stat { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .stat:last-child { border-bottom: none; }
    .stat-label { color: #888; }
    .stat-value { font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; background: #1a3a1a; color: #4caf50; margin-left: 6px; }
  </style>
</head>
<body>
  <h1>MIRROR</h1>
  <p class="tagline">60 seconds of voice. 50 pieces of content.</p>

  <div class="card">
    <label for="audio">Upload voice memo (MP3 or WAV)</label>
    <input type="file" id="audio" accept=".mp3,.wav,.m4a,.ogg" />
    <button id="btn" onclick="generate()">Generate</button>

    <div id="status"></div>
    <div id="result"></div>
  </div>

  <script>
    let jobId = null;
    let pollInterval = null;

    async function generate() {
      const file = document.getElementById("audio").files[0];
      if (!file) { alert("Please select an audio file."); return; }

      const btn = document.getElementById("btn");
      const status = document.getElementById("status");
      const result = document.getElementById("result");

      btn.disabled = true;
      status.style.display = "block";
      result.style.display = "none";
      status.innerHTML = "[Intake] Uploading audio...\n";

      const form = new FormData();
      form.append("file", file);

      const res = await fetch("/generate", { method: "POST", body: form });
      const data = await res.json();
      jobId = data.job_id;

      status.innerHTML += `[Intake] Job started: ${jobId}\n`;

      pollInterval = setInterval(poll, 3000);
    }

    async function poll() {
      const res = await fetch(`/jobs/${jobId}`);
      const data = await res.json();

      if (data.status === "complete") {
        clearInterval(pollInterval);
        showResult(data.result);
        document.getElementById("btn").disabled = false;
      } else if (data.status === "error") {
        clearInterval(pollInterval);
        document.getElementById("status").innerHTML += `[Error] ${data.error}\n`;
        document.getElementById("btn").disabled = false;
      } else {
        document.getElementById("status").innerHTML += "[Pipeline] Running...\n";
      }
    }

    function showResult(r) {
      const status = document.getElementById("status");
      status.innerHTML += `[Complete] ${r.total_outputs} outputs in ${r.duration_seconds.toFixed(1)}s\n`;

      const result = document.getElementById("result");
      result.style.display = "block";
      result.innerHTML = `
        <div class="stat"><span class="stat-label">Transcript</span><span class="stat-value">${(r.transcript || "").slice(0, 60)}...</span></div>
        <div class="stat"><span class="stat-label">Emotion</span><span class="stat-value">${r.emotion}</span></div>
        <div class="stat"><span class="stat-label">Videos</span><span class="stat-value">${Object.keys(r.videos).join(", ")}</span></div>
        <div class="stat"><span class="stat-label">Languages</span><span class="stat-value">${Object.keys(r.translations).length} languages</span></div>
        <div class="stat"><span class="stat-label">Total outputs</span><span class="stat-value">${r.total_outputs} <span class="badge">done</span></span></div>
        <div class="stat"><span class="stat-label">Duration</span><span class="stat-value">${r.duration_seconds.toFixed(1)}s</span></div>
        <div class="stat"><span class="stat-label">Trace ID</span><span class="stat-value" style="font-family:monospace;font-size:0.8rem">${r.trace_id}</span></div>
      `;
    }
  </script>
</body>
</html>
