<!DOCTYPE html>
<!-- Hyperframes template: YouTube motion graphics lower thirds -->
<html>
<head>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #stage { width: 1920px; height: 1080px; position: relative; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .lower-third { position: absolute; bottom: 80px; left: 60px; opacity: 0; transform: translateX(-40px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .lower-third.visible { opacity: 1; transform: translateX(0); }
    .lower-third-bar { width: 6px; height: 60px; background: #ff0000; display: inline-block; vertical-align: middle; margin-right: 16px; }
    .lower-third-text { display: inline-block; vertical-align: middle; }
    .lower-third-text h2 { color: #fff; font-family: -apple-system, sans-serif; font-size: 32px; font-weight: 700; margin: 0; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
    .lower-third-text p { color: #ccc; font-family: -apple-system, sans-serif; font-size: 20px; margin: 4px 0 0; }
    .subscribe-btn { position: absolute; bottom: 40px; right: 60px; background: #ff0000; color: #fff; font-family: -apple-system, sans-serif; font-size: 22px; font-weight: 700; padding: 14px 28px; border-radius: 4px; opacity: 0; transition: opacity 0.4s; }
    .subscribe-btn.visible { opacity: 1; }
    .chapter-marker { position: absolute; top: 40px; left: 60px; color: #fff; font-family: -apple-system, sans-serif; font-size: 18px; background: rgba(0,0,0,0.6); padding: 8px 16px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="stage">
    <video id="avatar" src="{{video_url}}" autoplay muted></video>
    <div class="chapter-marker" id="chapter">Introduction</div>
    <div class="lower-third" id="lower">
      <div class="lower-third-bar"></div>
      <div class="lower-third-text">
        <h2 id="hook-text">{{hook}}</h2>
        <p id="sub-text">Watch until the end</p>
      </div>
    </div>
    <div class="subscribe-btn" id="subscribe">Subscribe</div>
  </div>
  <script>
    const video = document.getElementById("avatar");
    const lower = document.getElementById("lower");
    const subscribe = document.getElementById("subscribe");

    video.addEventListener("timeupdate", () => {
      const t = video.currentTime;
      if (t >= 3 && t <= 9) { lower.classList.add("visible"); } else { lower.classList.remove("visible"); }
      if (video.duration && t >= video.duration - 5) { subscribe.classList.add("visible"); }
    });
  </script>
</body>
</html>
